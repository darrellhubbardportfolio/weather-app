<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App - Logging</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Material Outlined Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <!-- Stylesheets -->
    <link rel="stylesheet" href="/public/css/styles.css" />
    <link rel="stylesheet" href="/public/css/logging-page.css" />
</head>
<body>

    <main class="container-fluid">
        
        <section class="container-fluid p-5">

            <!-- history or log of making requests-->
            <table class="table table-striped border rounded-2">
                <thead>
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Location</th>
                        <th scope="col">Temperature</th>
                        <th scope="col">Condition</th>
                        <th scope="col">Time of Request</th>
                    </tr>
                </thead>
                <tbody id="requestHistory">
                    <!-- add one sample item here -->
                    <tr>
                        <th scope="row">1</th>
                        <td>New York</td>
                        <td>25°C</td>
                        <td>Sunny</td>
                        <td>2024-06-01 12:00:00</td>
                    </tr>
                    <!-- add two more, one from atlanta, ga and another from tokyo, japan -->
                    <tr>
                        <th scope="row">2</th>
                        <td>Atlanta</td>
                        <td>28°C</td>
                        <td>Cloudy</td>
                        <td>2024-06-01 13:00:00</td>
                    </tr>
                    <tr>
                        <th scope="row">3</th>
                        <td>Tokyo</td>
                        <td>30°C</td>
                        <td>Rainy</td>
                        <td>2024-06-01 14:00:00</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <!-- Bootstrap Js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- Popper Js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.11.8/umd/popper.min.js" integrity="sha512-TPh2Oxlg1zp+kz3nFA0C5vVC6leG/6mm1z9+mA81MI5eaUVqasPLO8Cuk4gMF4gUfP5etR73rgU/8PNMsSesoQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Chart Js-->
    <!-- JavaScript -->
    <script src="/public/js/Weather.js"></script>
    <script src="/public/js/RatePlan.js"></script>
</body>
</html>
